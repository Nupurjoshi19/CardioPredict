<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fdfdfd, #f5f5dc); /* white + beige */
      font-family: 'Segoe UI', sans-serif;
      color: #333;
    }
    .card {
      border-radius: 20px;
      background-color: #ffffff;
      color: #333;
      border: 1px solid #e0e0e0;
    }
    .card-header {
      background-color: #d9cbbd; /* soft beige header */
      border-radius: 20px 20px 0 0;
    }
    .alert {
      font-size: 1.3rem;
      border-radius: 15px;
      padding: 15px;
    }
    .alert-danger {
      background-color: #e07a5f; /* soft coral for risk */
      color: #fff;
    }
    .alert-success {
      background-color: #81b29a; /* sage green for healthy */
      color: #fff;
    }
    .btn-back {
      background-color: #c9a66b; /* muted golden beige */
      color: #fff;
      border-radius: 10px;
      font-weight: bold;
    }
    .btn-back:hover {
      background-color: #a67c52;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow-lg">
      <div class="card-header text-center">
        <h2>🔮 Prediction Result</h2>
      </div>
      <div class="card-body text-center">
        {% if prediction == "Disease Risk" %}
          <div class="alert alert-danger">⚠️ High Risk Detected: Disease Risk</div>
        {% else %}
          <div class="alert alert-success">🌱 You are Healthy</div>
        {% endif %}
        <a href="/" class="btn btn-back mt-3">⬅️ Go Back</a>
      </div>
    </div>
  </div>
</body>
</html>
