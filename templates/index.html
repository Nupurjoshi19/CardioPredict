<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Disease Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fdfdfd, #f5f5dc); /* white + beige */
      color: #333;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      border-radius: 20px;
      background-color: #ffffff;
      color: #333;
      border: 1px solid #e0e0e0;
    }
    .card-header {
      background-color: #d9cbbd; /* soft beige header */
      border-radius: 20px 20px 0 0;
    }
    .btn-predict {
      background-color: #c9a66b; /* muted golden beige */
      color: #fff;
      font-weight: bold;
      border-radius: 10px;
    }
    .btn-predict:hover {
      background-color: #a67c52;
    }
    label {
      font-weight: 500;
      color: #444;
    }
    .form-range::-webkit-slider-thumb {
      background: #c9a66b;
    }
    .slider-value {
      font-size: 0.9rem;
      margin-left: 10px;
      color: #a67c52;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow-lg">
      <div class="card-header text-center text-dark">
        <h2>Heart Disease Prediction</h2>
      </div>
      <div class="card-body">
        <form method="POST" class="row g-3">
          <!-- Age -->
          <div class="col-md-6">
            <label class="form-label">Age</label>
            <input type="range" name="age" min="20" max="100" value="50" class="form-range" id="ageRange" oninput="ageValue.innerText=this.value">
            <span class="slider-value" id="ageValue">50</span>
          </div>
          <!-- Sex -->
          <div class="col-md-6">
            <label class="form-label">Sex (0=Female,1=Male)</label>
            <input type="range" name="sex" min="0" max="1" value="1" class="form-range" id="sexRange" oninput="sexValue.innerText=this.value">
            <span class="slider-value" id="sexValue">1</span>
          </div>
          <!-- Chest Pain -->
          <div class="col-md-6">
            <label class="form-label">Chest Pain Type (0-3)</label>
            <input type="range" name="cp" min="0" max="3" value="0" class="form-range" id="cpRange" oninput="cpValue.innerText=this.value">
            <span class="slider-value" id="cpValue">0</span>
          </div>
          <!-- Resting BP -->
          <div class="col-md-6">
            <label class="form-label">Resting Blood Pressure (mm Hg)</label>
            <input type="range" name="trestbps" min="90" max="200" value="120" class="form-range" id="bpRange" oninput="bpValue.innerText=this.value">
            <span class="slider-value" id="bpValue">120</span>
          </div>
          <!-- Cholesterol -->
          <div class="col-md-6">
            <label class="form-label">Cholesterol (mg/dl)</label>
            <input type="range" name="chol" min="100" max="600" value="200" class="form-range" id="cholRange" oninput="cholValue.innerText=this.value">
            <span class="slider-value" id="cholValue">200</span>
          </div>
          <!-- FBS -->
          <div class="col-md-6">
            <label class="form-label">Fasting Blood Sugar (0=No,1=Yes)</label>
            <input type="range" name="fbs" min="0" max="1" value="0" class="form-range" id="fbsRange" oninput="fbsValue.innerText=this.value">
            <span class="slider-value" id="fbsValue">0</span>
          </div>
          <!-- Rest ECG -->
          <div class="col-md-6">
            <label class="form-label">Resting ECG (0-2)</label>
            <input type="range" name="restecg" min="0" max="2" value="0" class="form-range" id="ecgRange" oninput="ecgValue.innerText=this.value">
            <span class="slider-value" id="ecgValue">0</span>
          </div>
          <!-- Max HR -->
          <div class="col-md-6">
            <label class="form-label">Max Heart Rate</label>
            <input type="range" name="thalach" min="60" max="220" value="150" class="form-range" id="hrRange" oninput="hrValue.innerText=this.value">
            <span class="slider-value" id="hrValue">150</span>
          </div>
          <!-- Exercise Angina -->
          <div class="col-md-6">
            <label class="form-label">Exercise Angina (0=No,1=Yes)</label>
            <input type="range" name="exang" min="0" max="1" value="0" class="form-range" id="anginaRange" oninput="anginaValue.innerText=this.value">
            <span class="slider-value" id="anginaValue">0</span>
          </div>
          <!-- Oldpeak -->
          <div class="col-md-6">
            <label class="form-label">ST Depression</label>
            <input type="range" name="oldpeak" min="0" max="6" step="0.1" value="1" class="form-range" id="oldpeakRange" oninput="oldpeakValue.innerText=this.value">
            <span class="slider-value" id="oldpeakValue">1</span>
          </div>
          <!-- Slope -->
          <div class="col-md-6">
            <label class="form-label">Slope (0-2)</label>
            <input type="range" name="slope" min="0" max="2" value="1" class="form-range" id="slopeRange" oninput="slopeValue.innerText=this.value">
            <span class="slider-value" id="slopeValue">1</span>
          </div>
          <!-- CA -->
          <div class="col-md-6">
            <label class="form-label">Major Vessels (0-3)</label>
            <input type="range" name="ca" min="0" max="3" value="0" class="form-range" id="caRange" oninput="caValue.innerText=this.value">
            <span class="slider-value" id="caValue">0</span>
          </div>
          <!-- Thal -->
          <div class="col-md-6">
            <label class="form-label">Thalassemia (1-3)</label>
            <input type="range" name="thal" min="1" max="3" value="1" class="form-range" id="thalRange" oninput="thalValue.innerText=this.value">
            <span class="slider-value" id="thalValue">1</span>
          </div>
          <!-- Submit -->
          <div class="col-12">
            <button type="submit" class="btn btn-predict w-100">✨ Predict</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
